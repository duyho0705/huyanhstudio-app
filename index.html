<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='4' width='24' height='24' rx='4' fill='%23e8762b' transform='rotate(12 16 16)'/%3E%3Crect x='4' y='4' width='24' height='24' rx='4' fill='%236CD1FD' transform='rotate(-6 16 16)'/%3E%3Crect x='4' y='4' width='24' height='24' rx='4' fill='%2335104C'/%3E%3Ctext x='16' y='21' font-family='Arial' font-weight='bold' font-size='10' fill='white' text-anchor='middle'%3EHA%3C/text%3E%3C/svg%3E" />
    <title>Huy Anh Studio</title>
    <meta name="description" content="Huy Anh Studio cung cấp dịch vụ thu âm, quay phim và hậu kỳ chuyên nghiệp. Khám phá kho sản phẩm và các gói giải pháp truyền thông cao cấp." />
    <meta name="keywords" content="Huy Anh Studio, thu âm, quay phim, sản xuất âm nhạc, media studio, phòng thu" />
    <meta name="author" content="Huy Anh Studio" />
    <meta property="og:title" content="Huy Anh Studio | Kho nội dung cao cấp" />
    <meta property="og:description" content="Nơi hội tụ các tác phẩm Media và dịch vụ thu âm hàng đầu." />
    <meta property="og:image" content="./src/assets/logo.png" />
    <meta property="og:type" content="website" />
    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s ease-out;">
        <style>
          .loading-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
          .logo-box { width: 80px; height: 80px; background: #35104C; border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(53, 16, 76, 0.2); animation: pulse-logo 2s infinite ease-in-out; }
          .logo-text { color: white; font-family: sans-serif; font-weight: bold; font-size: 24px; }
          .spinner { width: 40px; height: 4px; background: #f1f5f9; border-radius: 4px; overflow: hidden; position: relative; }
          .spinner::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #6CD1FD; animation: loading 1.5s infinite ease-in-out; }
          @keyframes pulse-logo { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
          @keyframes loading { 0% { left: -100%; } 50% { left: 0; } 100% { left: 100%; } }
        </style>
        <div class="loading-container">
          <div class="logo-box">
            <span class="logo-text">HA</span>
          </div>
          <div class="spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  
</html>
